spring:
  application:
    name: enterprise-knowledge-operations-copilot

  profiles:
    active: ${SPRING_PROFILE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ekoc}
    username: ${DB_USERNAME:ekoc}
    password: ${DB_PASSWORD:ekoc}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  # Keycloak / OAuth2 resource server (activated when KEYCLOAK_ISSUER_URI is set)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:}

# Security — local / test profile uses hand-rolled JWT; docker profile uses Keycloak.
# Set KEYCLOAK_ISSUER_URI to activate Keycloak validation (disables the local JWT filter).
security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-production-min-256-bits}
    expiration: ${JWT_EXPIRATION:86400000} # 24 hours in ms
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in ms

keycloak:
  client-id: ${KEYCLOAK_CLIENT_ID:ekoc-frontend}

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:ekoc-documents}

# AI Configuration
ai:
  openai:
    api-key: ${OPENAI_API_KEY:}
    model:
      chat: ${OPENAI_CHAT_MODEL:gpt-4-turbo-preview}
      embedding: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}

  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model:
      chat: ${OLLAMA_CHAT_MODEL:llama2}
      embedding: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

  provider: ${AI_PROVIDER:openai} # openai or ollama

  embeddings:
    dimension: ${EMBEDDING_DIMENSION:1536}
    batch-size: ${EMBEDDING_BATCH_SIZE:100}

  retrieval:
    top-k: ${RETRIEVAL_TOP_K:5}
    similarity-threshold: ${SIMILARITY_THRESHOLD:0.7}

# Ingestion
ingestion:
  chunk-size: ${CHUNK_SIZE:1000}
  chunk-overlap: ${CHUNK_OVERLAP:200}
  supported-types:
    - application/pdf
    - text/plain
    - text/markdown

# Management
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    root: INFO
    io.innovation.ekoc: DEBUG
    org.springframework.security: WARN
    org.springframework.web: INFO
  file:
    name: logs/application.log

# Server
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
